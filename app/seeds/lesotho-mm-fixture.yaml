    ruleJson: ""
    targetValue: "1500.00"
    failMessage: ""

  - code: BENEFIT_AMOUNT_PRG_2025_004
    name: Drought Emergency Relief — flat M5,000 per applicant
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_004
    scope: budget_amount
    ruleType: assignment
    score: "0"
    allowSlowPath: "N"
    ruleJson: ""
    targetValue: "5000.00"
    failMessage: |
      Note: 1C-era expression rule will replace this flat with
      base + per-dependent (e.g. M5,000 + M1,000 × dependents under 12).

  # ------------------------------------------------------------------
  # L3-1 1C — programme_launch_gate rules. Per the budget-accounting
  # methodology §11.5 + ADR-025: programmes can be published only when
  # the projected cost fits the envelope. CES evaluates these rules at
  # programme-launch time AND can be re-evaluated at any moment to
  # surface drift. Default policy: coverage_ratio_pct ≤ 105 (5% over-
  # spend allowed; tightened or loosened per programme by overriding
  # with a programme-specific rule).
  #
  # registrationId="" makes these cross-programme defaults; analyst
  # adds a programme-scoped row with the same scope to override for
  # one specific programme (e.g. drought emergency: 110% allowed since
  # overruns are recoverable from the GoL emergency reserve).
  # ------------------------------------------------------------------
  - code: GATE_LAUNCH_DEFAULT
    name: Default — coverage ratio ≤ 105% of envelope
    serviceId: SUBSIDY_2025
    registrationId: ""
    scope: programme_launch_gate
    ruleType: inclusion
    score: "0"
    allowSlowPath: "N"
    ruleJson: coverage_ratio_pct <= 105
    failMessage: Estimated cost exceeds envelope allocation by more than 5%. Increase the envelope or reduce expected applicant count before launching.

  - code: GATE_LAUNCH_DROUGHT_RELIEF
    name: Drought Emergency — coverage ratio ≤ 110% (emergency reserve drawable)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_004
    scope: programme_launch_gate
    ruleType: inclusion
    score: "0"
    allowSlowPath: "N"
    ruleJson: coverage_ratio_pct <= 110
    failMessage: Drought-relief overrun exceeds 10% of the envelope. Coordinate with WFP/UNICEF/Treasury for additional contribution before launching.

