# =====================================================================
#  L4-1 / L4-3 automation — analyst-driven API endpoint declarations
#
#  Per RegBB §3.2 and the form-creator-api `/formcreator/apis` endpoint:
#  any form spec'd by the analyst (mm_screen-generated OR pre-existing
#  Joget form) can be exposed as a REST API by adding a row here.
#
#  apiKind values:
#    - crud         — full CRUD (post, get, put, delete, list, ...).
#                     Use for citizen-submit + read-back surfaces.
#    - read_only    — list + get-by-id only. Operator inspection.
#    - submit_only  — post + saveOrUpdate only. Append-only feeds.
#
#  The seeder POSTs each entry to /formcreator/apis. Idempotent: id is
#  derived from `code` so re-runs update in place rather than spawning
#  duplicates. Generated api_ids are recorded in
#  _seeds/.api_endpoints.json for downstream test utilities to consume.
# =====================================================================
mm_api:
  - code: API_SUBSIDY_APP_2025_CITIZEN
    name: 2025 Subsidy Application — Citizen Submit API
    formId: subsidyApplication2025
    apiKind: crud
    description: |
      L4-1 / L4-3 automation. Programmatic submission of citizen
      applications for the 12-scenario parity test. Full CRUD so the
      test utility can post applications, read back the saved record
      to verify storage, and clean up between scenarios.

  - code: API_SUBSIDY_APP_2025_OPERATOR
    name: 2025 Subsidy Application — Operator Read API
    formId: subsidyApplicationOperator2025
    apiKind: read_only
    description: |
      L4-1 / L4-3 automation. Read-only polling of application status
      and eligibility outcome for assertion-against-ground-truth. Kept
      read-only so test runs cannot accidentally mutate operator-side
      decisions.

_seed_business_keys:
  subsidyApplication2025: national_id
  md_village: code
  budget_envelope: code
  budget_envelope_source: code
  # budget_event has no global business key — append-only ledger. Each row
  # is uniquely identified by (transaction_id + account_path); the seeder
  # treats it as no-dedupe (NO_CODE_DEDUPE_FORMS) so re-running pre-clears.
  budget_event: code

# =====================================================================
#  Phase 3 IM Slice 1 — Inputs Management foundational MD + entities
