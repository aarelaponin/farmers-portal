    failMessage: Emergency Relief is limited to drought-declared districts and self-declared affected applicants.

  # ------------------------------------------------------------------
  # L4-1 D-003 — uniqueness check. RegBB §6.5 requires "one application
  # per applicant per (registration, period)". Implemented via the
  # capability registry pattern (RegBB §3.2 / ADR-020): a new adapter
  # `subsidy.prior_applications_this_programme` counts existing rows in
  # app_fd_subsidy_app_2025 with the same (national_id, applied_programme),
  # excluding the current application's own id (so an applicant editing
  # their own draft doesn't see false duplicates).
  #
  # The rule is replicated per-programme rather than authored once with
  # registrationId="" because MetaModelDao.listDeterminantsForRegistration
  # selects by exact registrationId match — service-wide eligibility rules
  # are an engine extension for L4-2 / Phase 2. Four identical rule bodies
  # is a minor copy-paste cost for keeping the engine logic unchanged.
  #
  # Pairs with mm_registration.evaluationStrategy=all_must_pass on every
  # programme (D-004 + D-005 fixes): if this rule returns FALSE, the
  # programme's eligibility evaluation falls to failed_mandatory →
  # auto_rejected, blocking the duplicate cleanly with a clear failMessage.
  # ------------------------------------------------------------------
  - code: DET_NO_DUPLICATE_PRG_001
    name: No prior application for this programme (PRG_2025_001)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
    ruleJson: $registry.subsidy.prior_applications_this_programme == "0"
    failMessage: You have already submitted an application for this programme. Each applicant may apply once per cycle.

  - code: DET_NO_DUPLICATE_PRG_002
    name: No prior application for this programme (PRG_2025_002)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_002
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
    ruleJson: $registry.subsidy.prior_applications_this_programme == "0"
    failMessage: You have already submitted an application for this programme. Each applicant may apply once per cycle.

  - code: DET_NO_DUPLICATE_PRG_003
    name: No prior application for this programme (PRG_2025_003)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_003
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
    ruleJson: $registry.subsidy.prior_applications_this_programme == "0"
    failMessage: You have already submitted an application for this programme. Each applicant may apply once per cycle.

  - code: DET_NO_DUPLICATE_PRG_004
    name: No prior application for this programme (PRG_2025_004)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_004
    scope: applicability
