  # ------------------------------------------------------------------
  # L2-1 capability-registry test rules (ADR-020). Two test rules
  # exercising both adapters end-to-end via the /eval endpoint.
  # Not attached to any registration — pure /eval probes.
  # ------------------------------------------------------------------

  # Regression: existing FarmerByNidAdapter still resolves
  # $registry.farmer.<field> correctly after the registry refactor.
  - code: TEST_FARMER_REGISTERED_HAS_NAME
    name: TEST — farmer is registered (has a non-empty first_name)
    serviceId: ""
    registrationId: ""
    scope: applicability
    ruleType: inclusion
    score: "0"
    allowSlowPath: "N"
    ruleJson: $registry.farmer.first_name != ""
    failMessage: Farmer is not in the registry (no first_name).
    description: |
      L2-1 regression test. /eval with applicantData.national_id matching a
      registered farmer should return TRUE. /eval with a made-up NID (no row
      in app_fd_farmerbasicinfo) should return NULL — the grammar's null-
      propagation per spec §4.3.0.1.

  # New: ParcelsSummaryAdapter returns parcel count via the new capability.
  # Live data has 184 parcels with empty c_parent_id, so this returns 0 for
  # every NID until parcel→farmer linkage is populated. The rule still
  # evaluates correctly (FALSE for "has parcels") and audit captures the
  # resolved 0 — proving the dispatch path through ParcelsSummaryAdapter
  # works end-to-end.
  - code: TEST_FARMER_HAS_PARCELS
    name: TEST — farmer has at least one parcel registered
    serviceId: ""
    registrationId: ""
    scope: applicability
    ruleType: inclusion
    score: "0"
    allowSlowPath: "N"
    ruleJson: $registry.parcels_summary.parcel_count > 0
    failMessage: Farmer has no parcels in the registry.
    description: |
      L2-1 capability-registry probe. Today returns FALSE for everyone
      because parcelregistration.c_parent_id is empty across all 184 live
      rows (data integrity gap noted in registry-integration SAD §5.3).
      When that linkage is populated, this rule activates without code
      change — the test of pluggability.

mm_action:
  # Phase 2-b demo binding. Sysadmin creates a Joget process called
  # `subsidy_2025_approval_notification` with a single tool step pointing at
  # the RegBB Workflow Echo Tool. When an operator approves an application
  # for SUBSIDY_2025, RegBbOperatorDecisionBinder transitions status →
  # "approved" and WorkflowDispatcher fires this rule's workflow.
  #
  # The convention: triggerJson carries onStatus + workflowId. The
  # workflowId can be either the full "packageId#version#processId" or just
  # the processId — getConvertedLatestProcessDefId resolves it to the
  # latest published version automatically.
  - code: NOTIFY_APPROVAL
    name: Notify approval — fire downstream workflow
    serviceId: SUBSIDY_2025
    registrationId: ""    # service-wide; matches any registration
    kind: status_change
    triggerJson: |
      {"onStatus":"approved","workflowId":"subsidy_2025_approval_notification"}
    description: |
      When an operator approves an application, fire the configured Joget
      process. Slice 2-b uses RegBbWorkflowEchoTool to verify the handoff;
      production replaces with notification + downstream tool steps designed
      in Joget Process Builder by sysadmin.

  # L2-3 — bot_pull demo. Citizen types NID on the Identity tab; on blur
  # the kernel fires this action, which resolves applicant fields from the
  # farmer registry via the L2-1 capability adapter (farmer.<field>) and
  # returns target → value JSON. Client-side JS auto-fills the form.
  #
  # mm_field.actionIds=AUTOFILL_FROM_FARMER_REGISTRY on national_id wires
  # the trigger; configJson.fieldMappings names the targets and the source
  # capability/field for each.
  - code: AUTOFILL_FROM_FARMER_REGISTRY
    name: Auto-fill identity tab from farmer registry on NID entry
    serviceId: SUBSIDY_2025
    registrationId: ""    # service-wide
    kind: bot_pull
    triggerJson: |
      {"fieldId":"national_id"}
    configJson: |
      {
        "fieldMappings": [
          {"target":"full_name",     "sourceCapability":"farmer", "sourceField":"full_name"},
          {"target":"date_of_birth", "sourceCapability":"farmer", "sourceField":"date_of_birth"},
          {"target":"contact_phone", "sourceCapability":"farmer", "sourceField":"contact_phone"},
          {"target":"gender",        "sourceCapability":"farmer", "sourceField":"gender"}
        ]
      }
    description: |
      D11 / L2-3 — eliminate re-entry. Citizen types NID; the system
      resolves identity fields from the farmer registry. Doesn't overwrite
      values the citizen has already typed (JS guards against that). Audit
      row records the auto-fill via the underlying capability adapter call.

      Targets are limited to fields that (a) exist on the APP_APPLICANT
      screen AND (b) are resolvable via FarmerByNidAdapter. Notably district
      is NOT here — the registry's farmerbasicinfo table doesn't carry it,
      and farmerresidency hasn't been populated yet. When the residency
      tab gets stable columns, add a farmerResidencyByNidAdapter capability
      and extend mappings here without touching the kernel.

  # ---- L3-1 1B-i — budget lifecycle hooks ----
  # Each mm_action.kind=budget_event row is dispatched by 1B-ii to the
  # BudgetEngine listener at the appropriate lifecycle moment. For 1B-i
  # they're triggered manually via POST /budget/dispatch with the action
  # code; 1B-ii will wire them into the subsidy storeBinder so the firing
  # is automatic on application save / status transition.
  #
  # triggerJson shape for budget_event:
  #   eventType         — RESERVATION | RELEASE_RESERVATION | PRE_COMMITMENT | etc.
  #   amountFormulaRule — mm_determinant.code (BENEFIT_AMOUNT_*) — flat in 1B-i
  #   conditionRule     — optional; rule that gates the dispatch (e.g. only on
  #                       certain dispositions)
  #   envelopeCode      — optional; if absent, the engine resolves from
  #                       mm_registration[applied_programme].budgetEnvelopeCode
  #                       (1B-ii); for 1B-i the test driver passes it explicitly.

  - code: BUDGET_RESERVE_ON_SUBMIT_PRG_001
    name: Budget reservation on application submit (PRG_001)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    kind: budget_event
    triggerJson: |
      {"eventType":"RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_001"}
    description: |
      Fires when a citizen submits a PRG_001 application. Posts a
      RESERVATION transaction: M2,000 moves from ENV_PRG_2025_001.AVAILABLE
      to ENV_PRG_2025_001.RESERVED, with full source proration (single
      source: GOL 100%).

  - code: BUDGET_RESERVE_ON_SUBMIT_PRG_002
    name: Budget reservation on application submit (PRG_002)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_002
    kind: budget_event
    triggerJson: |
      {"eventType":"RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_002"}
    description: |
      Fires on PRG_002 submission. Posts RESERVATION + 60/40 proration
      to GOL/FAO-IFAD source contributions.

  - code: BUDGET_RESERVE_ON_SUBMIT_PRG_003
    name: Budget reservation on application submit (PRG_003)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_003
    kind: budget_event
    triggerJson: |
      {"eventType":"RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_003"}

  - code: BUDGET_RESERVE_ON_SUBMIT_PRG_004
    name: Budget reservation on application submit (PRG_004)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_004
    kind: budget_event
    triggerJson: |
      {"eventType":"RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_004"}

  - code: BUDGET_RELEASE_ON_REJECT_PRG_001
    name: Budget release on application reject/withdrawal (PRG_001)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    kind: budget_event
    triggerJson: |
      {"eventType":"RELEASE_RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_001"}
    description: |
      Fires when a citizen's submitted application is rejected (auto or
      operator) or withdrawn. Reverses the prior RESERVATION.

  - code: BUDGET_RELEASE_ON_REJECT_PRG_002
    name: Budget release on application reject/withdrawal (PRG_002)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_002
    kind: budget_event
    triggerJson: |
      {"eventType":"RELEASE_RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_002"}

  - code: BUDGET_RELEASE_ON_REJECT_PRG_003
    name: Budget release on application reject/withdrawal (PRG_003)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_003
    kind: budget_event
    triggerJson: |
      {"eventType":"RELEASE_RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_003"}

  - code: BUDGET_RELEASE_ON_REJECT_PRG_004
    name: Budget release on application reject/withdrawal (PRG_004)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_004
    kind: budget_event
    triggerJson: |
      {"eventType":"RELEASE_RESERVATION","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_004"}

  - code: BUDGET_PRE_COMMIT_ON_APPROVE_PRG_001
    name: Budget pre-commitment on operator approval (PRG_001)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    kind: budget_event
    triggerJson: |
      {"eventType":"PRE_COMMITMENT","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_001"}
    description: |
      Fires when an operator approves a PRG_001 application. Money moves
      from ENV.RESERVED to ENV.PRE_COMMITTED. A beneficiary sub-ledger
      account opens (BNF_<applicationId>) holding the obligation.

  - code: BUDGET_PRE_COMMIT_ON_APPROVE_PRG_002
    name: Budget pre-commitment on operator approval (PRG_002)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_002
    kind: budget_event
    triggerJson: |
      {"eventType":"PRE_COMMITMENT","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_002"}

  - code: BUDGET_PRE_COMMIT_ON_APPROVE_PRG_003
    name: Budget pre-commitment on operator approval (PRG_003)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_003
    kind: budget_event
    triggerJson: |
      {"eventType":"PRE_COMMITMENT","amountFormulaRule":"BENEFIT_AMOUNT_PRG_2025_003"}

  - code: BUDGET_PRE_COMMIT_ON_APPROVE_PRG_004
    name: Budget pre-commitment on operator approval (PRG_004)
