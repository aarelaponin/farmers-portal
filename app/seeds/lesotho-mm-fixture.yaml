  - subsidyApplication2025
  # Phase 3 IM Slice 1 (after May 2026 cleanup) — IM master data + entities.
  # md27input + md37collectionPoint reuse the legacy MD.27 / MD.37 chains
  # already in the JWA (md27inputCategory has 8 production rows; md37
  # is now loaded with the 60 real Resource Centres from the docx).
  # md_input_unit, md_supplier_type, md_voucher_status, im_supplier are
  # genuine gap-fillers authored fresh in Slice 1.
  - md_input_unit
  - md_supplier_type
  - md_voucher_status
  - md27input                         # legacy MD.27 chain (md27inputCategory is parent)
  - md37collectionPoint               # 60 real Lesotho Resource Centres (replaces md45DistribPoint)
  - im_supplier
  # Phase 3 IM Slice 2 — inventory spine. Order matters: md37collectionPoint
  # + md27input + im_supplier above are the FK targets for inventory + txns.
  - im_inventory
  - im_stock_transaction       # parent header (Slice 6d shape — no input/qty)
  - im_stock_txn_line          # FormGrid children (Slice 6d) — _ref to txn parent
  # Phase 3 IM Slice 3 — allocation plan + lines. Plan first (parent),
  # then lines (children with plan_id _ref to the plan's UUID).
  - im_allocation_plan
  - im_allocation_line
