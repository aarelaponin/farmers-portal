# Canonical Lesotho mm_* test fixture, seeded via _tooling/seed.py.
#
# Conventions (per D20 / D22 / D23):
#   - Joget UUID id is internal/auto; never written by the seeder.
#   - Every entity is keyed by its business `code`; the seeder upserts by code.
#   - Cross-entity FKs use the target's code (e.g. service: SUBSIDY_2025), not
#     the target's UUID. Joget's FormOptionsBinder resolves it.
#   - Joget-internal FKs (FormGrid: mm_field.screenId pointing at a screen's
#     UUID) are resolved by the seeder using the special form
#     `_ref:<formId>:<code>`, which it substitutes for the parent's UUID.
#   - No `isActive` (D23: hard-delete only).

# =====================================================================
#  GROUP A — Service definition (top-down structural)
# =====================================================================

mm_institution:
  - code: MIN_AGRO
    name: Ministry of Agriculture and Food Security
    institutiontype: ministry

mm_service:
  - code: SUBSIDY_2025
    name: Farmers Subsidy 2025
    entityInstitutionId: MIN_AGRO
    description: |
      Single-Window service for the 2025 subsidy season. Houses four
      registrations (Block Farming, Mountain Pulses, E-Voucher Pilot,
      Drought Emergency) under one citizen-facing entry point.

  # Phase 3 IM Slice 1 — Inputs Management namespace per ADR-017.
  # No mm_registration rows for INPUTS_2025: per IM SAD §4.4 mm_service
  # for IM is namespace-only — inputs distribution is supply-chain
  # logistics, not a citizen service. All IM mm_* rows (determinants,
  # actions, screens, fields) carry serviceId='INPUTS_2025' so they
  # group together for the operator's authoring surface.
  - code: INPUTS_2025
    name: Inputs Management 2025/26 Cycle
    entityInstitutionId: MIN_AGRO
    description: |
      Inputs Management module — supply-chain side of the subsidy programme:
      catalogue, supplier registry, inventory, allocation plans, voucher
      issuance, distribution events. Triggered downstream of subsidy
      approval (mm_action ISSUE_IM_ENTITLEMENT, future slice).

mm_registration:
  - code: PRG_2025_001
    name: Block Farming — Maize Lowlands 2025/26
    serviceId: SUBSIDY_2025
    applicabilityKind: optional_for_specific
    applicabilityDeterminantId: DET_LOWLANDS
    # Phase 1 (slice 1B-c) shipped this as score_based(50, 150) with two
    # 100-point rules to demo the pending_review band. L4-1 D-005 surfaced
    # the loophole: a non-lowlands applicant who's in the registry could
    # still squeak through the threshold (100 + 50 = 150 ≥ 150 → passed).
    # Combined with L4-1 D-003 (duplicate check needs to be mandatory-fail),
    # the cleanest path is all_must_pass: every eligibility rule must be
    # TRUE, no scoring, no loopholes. Aligns this programme with PRG_002,
    # PRG_003, PRG_004 — all four now use the same strategy.
    evaluationStrategy: all_must_pass
    acceptanceWindowFrom: "2025-08-01"
    acceptanceWindowTo:   "2026-01-31"
    attributesJson: |
      {"programmeType":"INPUT_SUBSIDY","seasonCode":"2024-25-summer",
       "legalBasis":"Subsidy Policy 2003 §4.2.1",
       "fundingSource":"Government of Lesotho — MAFSN Annual Budget"}
    description: Lowlands intensive crop strategy; Block Farming Programme since 2005/06.

  - code: PRG_2025_002
    name: Mountain Pulses & Wheat — Winter 2025
    serviceId: SUBSIDY_2025
    applicabilityKind: optional_for_specific
    applicabilityDeterminantId: DET_MOUNTAINS_OR_SENQU
    # Single-rule programme; switched from score_based(0,50) to all_must_pass.
    # With score_based(min=0, pass=50) and one DET_MOUNTAINS_OR_SENQU(score=100):
    # rule TRUE → 100 ≥ 50 → passed; rule FALSE → score=0, but 0 ≥ 0 (min) AND
    # 0 < 50 (pass) → pending_review (instead of failed_mandatory). That's the
    # L4-1 D-004 defect — non-mountain applicants land in pending_operator_review
    # instead of auto_rejected. all_must_pass turns this single-rule programme
    # into all-or-nothing: TRUE → passed, FALSE → failed_mandatory. Cleanest
    # semantics for a programme that has only one geographic gate.
    evaluationStrategy: all_must_pass
    acceptanceWindowFrom: "2025-04-01"
    acceptanceWindowTo:   "2025-06-30"
    attributesJson: |
      {"programmeType":"INPUT_SUBSIDY","seasonCode":"2025-winter",
       "legalBasis":"Subsidy Policy 2003 §4.3",
       "fundingSource":"Mixed: 60% Government of Lesotho, 40% FAO/IFAD"}
    description: Mountains & Senqu River Valley strategy. Wheat/peas/beans favoured.

  - code: PRG_2025_003
    name: Smallholder E-Voucher Pilot 2025/26
    serviceId: SUBSIDY_2025
    applicabilityKind: optional_for_specific
    applicabilityDeterminantId: DET_SMALLHOLDER
    # Single-rule programme; same fix as PRG_2025_002 (D-004). One eligibility
    # rule DET_SMALLHOLDER means score_based(0, 70) misclassifies non-smallholder
    # applicants as pending_review instead of failed_mandatory. all_must_pass.
    evaluationStrategy: all_must_pass
    acceptanceWindowFrom: "2025-07-01"
    acceptanceWindowTo:   "2025-12-31"
    attributesJson: |
      {"programmeType":"VOUCHER","seasonCode":"2024-25-summer",
       "legalBasis":"Subsidy Policy 2003 §1.2.viii (investment) + §2.4 (private-sector distribution)",
       "fundingSource":"Donor: World Bank — SADP-II"}
    description: Pilot under World Bank SADP-II; private-sector e-voucher distribution.

  - code: PRG_2025_004
    name: Drought Emergency Relief 2025
    serviceId: SUBSIDY_2025
    applicabilityKind: optional_for_specific
    applicabilityDeterminantId: DET_DROUGHT_DECLARED
    evaluationStrategy: all_must_pass
    acceptanceWindowFrom: "2025-09-01"
    acceptanceWindowTo:   "2026-03-31"
    attributesJson: |
      {"programmeType":"EMERGENCY","seasonCode":"2024-25-summer",
       "legalBasis":"DMA Declaration 2025-001; Subsidy Policy §2.2.2",
       "fundingSource":"Donor: WFP + UNICEF + Government emergency reserve"}
    description: Emergency response to acute food insecurity.

# =====================================================================
#  Application flow — six shared screens at service level
# =====================================================================

mm_screen:
  - code: APP_INTRO
    audience: citizen
    title: Welcome — 2025 Subsidy Application
    serviceId: SUBSIDY_2025
    kind: guide
    guideKind: catalogue        # L2-2 — RegBB §6.1.6 single-window catalogue
    orderIndex: "1"
    description: |
      Choose a programme below to begin your application. Each card shows
      whether you're currently eligible based on the information already
      captured. If a programme says "Need more information" — fill in the
      next tabs and return here to re-evaluate.

  - code: APP_APPLICANT
    audience: citizen
    title: Applicant Identity
    serviceId: SUBSIDY_2025
    kind: form
    orderIndex: "2"
    description: Identity and contact details of the applicant.

  - code: APP_PARCEL
    audience: citizen
    title: Parcel Information
    serviceId: SUBSIDY_2025
    kind: form
    orderIndex: "3"
    description: Where the farm is located and how big it is.

  - code: APP_CROPS
    audience: citizen
    title: Crops & Activities
    serviceId: SUBSIDY_2025
    kind: form
    orderIndex: "4"
    description: What the applicant grows and produces.

  - code: APP_DOCUMENTS
    audience: citizen
    title: Required Documents
    serviceId: SUBSIDY_2025
    kind: documents
    orderIndex: "5"
    description: |
      Uploads. Required documents differ by programme — list comes from
      mm_required_doc rows scoped to the matching registration.

  - code: APP_REVIEW
    audience: citizen
    title: Review & Submit
    serviceId: SUBSIDY_2025
    kind: review
    orderIndex: "6"
    description: Confirm the application before sending.

  # ---- Operator-side screens (rendered with readonly=Y for citizen sections,
  # and a dedicated OP_DECISION section that the operator fills in). ----
  - code: OP_DECISION
    audience: operator
    title: Operator Decision
    serviceId: SUBSIDY_2025
    kind: form
    orderIndex: "10"
    description: |
      Operator decision section. Renders alongside the citizen's submitted
      data (which the operator inspects in readonly mode via Meta Screen
      widgets pointing at APP_APPLICANT / APP_PARCEL / APP_CROPS).

# =====================================================================
#  Fields per screen (FormGrid-managed; screenId via _ref placeholder)
# =====================================================================

mm_field:
  # ---- APP_APPLICANT ----
  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: applied_programme
    label: Applying for
    widget: select
    dataType: string
    orderIndex: "0"
    defaultBehaviorOnError: required
    displayOnList: "Y"
    claimType: application.appliedProgramme
    optionsCatalogId: PROGRAMMES_2025
    helpText: Pick one of the four 2025 subsidy programmes. The system will check your eligibility for the selected programme on submit.

  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: national_id
    label: National ID
    widget: text
    dataType: string
    orderIndex: "1"
    defaultBehaviorOnError: required
    claimType: applicant.nationalId
    actionIds: AUTOFILL_FROM_FARMER_REGISTRY      # L2-3 — bot_pull on blur
    helpText: 13-digit national identity number issued by the Department of National Identity. Other fields auto-fill if you're already in the registry.

  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: full_name
    label: Full Name
    widget: text
    dataType: string
    orderIndex: "2"
    defaultBehaviorOnError: required
    displayOnList: "Y"
    claimType: applicant.fullName

  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: gender
    label: Gender
    widget: radio
    dataType: string
    orderIndex: "3"
    defaultBehaviorOnError: required
    claimType: applicant.gender
    optionsCatalogId: GENDER

  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: date_of_birth
    label: Date of Birth
    widget: date
    dataType: date
    orderIndex: "4"
    defaultBehaviorOnError: required
    claimType: applicant.dateOfBirth

  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: contact_phone
    label: Mobile Phone (+266 XXXX XXXX)
    widget: text
    dataType: string
    orderIndex: "5"
    defaultBehaviorOnError: required
    claimType: applicant.contactPhone

  # L1-3 — signature widget pass-through. Citizen signs at the bottom of the
  # Applicant Identity screen confirming the personal details they entered.
  # Pure render test today — when the applicant signs, the base64-encoded
  # PNG persists into c_applicant_signature on the application table.
  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: applicant_signature
    label: Applicant Signature
    widget: signature
    dataType: string
    orderIndex: "6"
    defaultBehaviorOnError: optional
    claimType: applicant.signature
    helpText: Sign here to confirm the personal details above are correct.

  # L1-4 — one-off file_upload on a form-kind screen. NOT a mm_required_doc
  # entry; this is the "I have an extra document I'd like to attach"
  # affordance. Stores the bare filename in c_extra_id_attachment; the file
  # itself moves to wflow/app_formuploads/subsidy_app_2025/<id>/<filename>
  # on save. Optional — citizen can skip.
  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: extra_id_attachment
    label: Optional ID Attachment
    widget: file_upload
    dataType: string
    orderIndex: "7"
    defaultBehaviorOnError: optional
    claimType: applicant.extraIdAttachment
    helpText: |
      Optional. Upload one extra identity document if applicable
      (passport scan, employer letter, etc.). PDF/JPG/PNG up to 5 MB.

  # L1-6 — repeating_group widget pointing at the existing
  # householdMemberForm. Demonstrates the kernel can synthesise a FormGrid
  # via metadata: child form holds the rows, kernel attaches both
  # MultirowFormBinder load and store binders so add/edit/delete + reload
  # round-trip correctly.
  #
  # Rows persist into app_fd_household_members.c_farmer_id pointing at the
  # subsidy application id (foreignKey=farmer_id is the existing column on
  # that form — we're reusing the table conceptually as "people associated
  # with this application").
  #
  # Columns are widgetConfig-driven per ADR-029 — analyst picks which child
  # fields appear in the grid and their headers/widths. NO mm_field column
  # is created for this storageKey because the data lives in the child
  # table, not on the parent.
  - screenId: "_ref:mm_screen:APP_APPLICANT"
    storageKey: application_household_members
    label: Household Members for this Application
    widget: repeating_group
    dataType: string
    orderIndex: "8"
    defaultBehaviorOnError: optional
    referencedFormId: householdMemberForm
    claimType: applicant.householdMembers
    helpText: |
      Add household members covered by this application. The kernel
      renders this as an editable grid.
    widgetConfig: |
      {
        "foreignKey": "farmer_id",
        "pageSize": 10,
        "height": 350,
        "validateMinRow": 0,
        "options": [
          { "value": "memberName",   "label": "Name",        "width": "200", "formatType": "text"    },
          { "value": "sex",          "label": "Sex",         "width": "80",  "formatType": "options" },
          { "value": "date_of_birth","label": "DoB",         "width": "120", "formatType": "date",   "format": "dd/MM/yyyy" },
          { "value": "relationship", "label": "Relationship","width": "150", "formatType": "options" }
        ]
      }

  # ---- APP_PARCEL ----
  - screenId: "_ref:mm_screen:APP_PARCEL"
    storageKey: district
    label: District
    widget: select
    dataType: string
    orderIndex: "1"
    defaultBehaviorOnError: required
    displayOnList: "Y"
    claimType: parcel.district
    optionsCatalogId: LESOTHO_DISTRICTS

  - screenId: "_ref:mm_screen:APP_PARCEL"
    storageKey: agro_zone
    label: Agro-Ecological Zone
    widget: select
    dataType: string
    orderIndex: "2"
    defaultBehaviorOnError: required
    claimType: parcel.agroZone
    optionsCatalogId: AGRO_ZONES
    helpText: Determines which programme(s) you may apply for.

  - screenId: "_ref:mm_screen:APP_PARCEL"
    storageKey: village_name
    label: Village Name
    widget: cascading_select          # L1-1 — kernel pass-through to native Joget cascade
    dataType: string
    orderIndex: "3"
    defaultBehaviorOnError: required
    claimType: parcel.village
    optionsCatalogId: md_village      # form id (NOT mm_catalog code) — cascading_select convention
    optionsFilterField: district      # parent field whose value filters the village dropdown

  - screenId: "_ref:mm_screen:APP_PARCEL"
    storageKey: area_hectares
    label: Cultivated Area (hectares)
    widget: number
    dataType: number
    orderIndex: "4"
    defaultBehaviorOnError: required
    claimType: parcel.areaHectares
    helpText: Total cultivated area on this parcel for the upcoming season.

  - screenId: "_ref:mm_screen:APP_PARCEL"
    storageKey: tenure_type
    label: Land Tenure
    widget: select
    dataType: string
    orderIndex: "5"
    defaultBehaviorOnError: required
    claimType: parcel.tenureType
    optionsCatalogId: TENURE_TYPES

  # L1-5 — gis_polygon widget. Stores the drawn polygon as GeoJSON in
  # c_parcel_geometry. Six companion HiddenFields (area_hectares,
  # perimeter_meters, vertex_count, centroid_lat, auto_center_lat,
  # auto_center_lon) are auto-synthesised by MetaScreenElement.
  # area_hectares already exists as a number field above (orderIndex 4),
  # so the JS will write the auto-computed value into the visible TextField
  # — citizen sees the area update as they draw. The dedupe guard in
  # attachGisCompanionHiddenFields keeps it from being duplicated as a
  # HiddenField.
  - screenId: "_ref:mm_screen:APP_PARCEL"
    storageKey: parcel_geometry
    label: Draw Parcel Boundary
    widget: gis_polygon
    dataType: string
    orderIndex: "6"
    defaultBehaviorOnError: optional
    claimType: parcel.geometry
    helpText: |
      Walk the parcel boundary (mobile GPS) or click points on the map
      (desktop) to capture the polygon. Area, perimeter, and vertex
      count are computed automatically as you draw.
    # L1-5b — analyst-authored widget overrides. Kernel defaults set
    # defaultZoom=13, mapHeight=400 — this row tunes them up for a
    # closer-in initial view and a taller map. Allowlist enforces that
    # field-binding props (areaFieldId etc.) cannot be overridden.
    widgetConfig: |
      {
        "defaultZoom": 15,
        "mapHeight": 500,
        "minVertices": 3,
        "maxVertices": 50
      }

  # ---- APP_CROPS ----
  - screenId: "_ref:mm_screen:APP_CROPS"
    storageKey: primary_crop
    label: Primary Crop (intended)
    widget: select
    dataType: string
    orderIndex: "1"
    defaultBehaviorOnError: required
    claimType: parcel.primaryCrop
    optionsCatalogId: CROPS

  - screenId: "_ref:mm_screen:APP_CROPS"
    storageKey: block_farming_member
    label: Member of a Block Farming Cooperative?
    widget: radio
    dataType: string
    orderIndex: "2"
    defaultBehaviorOnError: optional
    claimType: applicant.blockFarmingMember
    optionsCatalogId: YES_NO
    helpText: Required for Block Farming programmes.

  - screenId: "_ref:mm_screen:APP_CROPS"
    storageKey: cooperative_name
    label: Cooperative Name
    widget: text
    dataType: string
    orderIndex: "3"
    defaultBehaviorOnError: optional
    claimType: applicant.cooperativeName
    # §6.4 Conditional UI — only show when block_farming_member == "yes"
    visibilityDeterminantId: DET_BLOCK_FARMING_MEMBER
    requirednessDeterminantId: DET_BLOCK_FARMING_MEMBER

  - screenId: "_ref:mm_screen:APP_CROPS"
    storageKey: drought_affected_decl
    label: Has your parcel been impacted by the 2025 drought?
    widget: radio
    dataType: string
    orderIndex: "4"
    defaultBehaviorOnError: optional
    claimType: applicant.droughtAffectedDeclaration
    optionsCatalogId: YES_NO
    helpText: Required for Drought Emergency Relief.

  - screenId: "_ref:mm_screen:APP_CROPS"
    storageKey: notes
    label: Additional Notes
    widget: textarea
    dataType: string
    orderIndex: "5"
    defaultBehaviorOnError: optional

  # ---- OP_DECISION (operator side) ----
  # Eligibility summary — read-only panel showing the engine's verdict
  # (status + disposition + score + failed rule) so the operator sees the
  # same outcome reported on the inbox list, in context of the application
  # they're reviewing. No column persisted.
  - screenId: "_ref:mm_screen:OP_DECISION"
    storageKey: eligibility_summary_panel
    label: Eligibility Outcome
    widget: eligibility_summary
    dataType: string
    orderIndex: "0"
    defaultBehaviorOnError: optional

  # L3-1 3a form-side — render-only Budget Impact panel above the decision
  # radio. Same renderer as the inbox-list BudgetHintFormatter, so the
  # operator sees identical figures on both surfaces. No column persisted.
  - screenId: "_ref:mm_screen:OP_DECISION"
    storageKey: budget_hint_panel
    label: Budget Impact
    widget: budget_hint
    dataType: string
    orderIndex: "1"
    defaultBehaviorOnError: optional

  - screenId: "_ref:mm_screen:OP_DECISION"
    storageKey: decision
    label: Decision
    widget: radio
    dataType: string
    orderIndex: "2"
    defaultBehaviorOnError: required
    displayOnList: "Y"
    claimType: operator.decision
    optionsCatalogId: DECISION_OUTCOMES

  - screenId: "_ref:mm_screen:OP_DECISION"
    storageKey: decision_score
    label: Recommended Score (for score_based programmes)
    widget: number
    dataType: number
    orderIndex: "3"
    defaultBehaviorOnError: optional
    displayOnList: "Y"
    claimType: operator.recommendedScore
    helpText: 0–100. Ignored for all_must_pass strategies (e.g. PRG_2025_004 Drought Emergency).

  - screenId: "_ref:mm_screen:OP_DECISION"
    storageKey: decision_comment
    label: Operator Comment
    widget: textarea
    dataType: string
    orderIndex: "4"
    defaultBehaviorOnError: required

  - screenId: "_ref:mm_screen:OP_DECISION"
    storageKey: decided_at
    label: Decision Date
    widget: date
    dataType: date
    orderIndex: "5"
    defaultBehaviorOnError: required

