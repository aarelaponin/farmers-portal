mm_determinant:
  - code: DET_LOWLANDS
    name: Applicant farms in the Lowlands
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
    # Per ADR-003: ruleJson stores DSL source verbatim. Bare identifiers
    # resolve against $applicant.* per spec §4.3.1; storage keys are
    # mm_field.storageKey values (matching c_<storageKey> columns).
    ruleJson: agro_zone == 'lowlands'
    failMessage: This programme is restricted to Lowlands applicants.
    description: |
      Block Farming — Maize Lowlands targets the lowlands intensive crop
      strategy. Mountain / Senqu applicants are not eligible.

  - code: DET_AREA_NONZERO
    name: Applicant has declared a positive cultivated area
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
    # Slice 1B-a demo rule: second eligibility check on PRG_2025_001 so the
    # all_must_pass aggregation has something to aggregate over. Also exercises
    # the numeric-comparison path (`gt`) of the fast-path evaluator, which
    # DET_LOWLANDS doesn't.
    ruleJson: area_hectares > 0
    failMessage: Cultivated area must be greater than zero hectares.
    description: |
      Block Farming applications must declare a non-zero cultivated parcel.
      A nil or missing area indicates an incomplete application; the rule
      returns FALSE on zero, NULL on missing — both are caught by aggregation.

  - code: DET_FARMER_REGISTERED
    name: Applicant is registered in the farmer registry
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    scope: applicability
    ruleType: inclusion
    score: "50"
    allowSlowPath: "N"
    # Slice 1B-b demo rule. The $registry.farmer reference forces the routing
    # evaluator to dispatch this rule to the SQL path: it pre-resolves the
    # farmer's first_name from app_fd_farmerbasicinfo (joined by national_id),
    # substitutes the literal back into the rule, then defers to fast-path
    # for the != '' comparison. Applicants whose national_id has no row in
    # the farmer registry resolve to null → comparison returns NULL → score-
    # based aggregation propagates to indeterminate (per ADR-007 never-null).
    ruleJson: $registry.farmer.first_name != ""
    failMessage: Applicant is not yet registered in the farmer registry; complete farmer registration first.
    description: |
      Block Farming participants must be on the national farmer registry.
      Touches a different table than the application's own data, so this
      rule routes through the SqlPathEvaluator (slice 1B-b).

  - code: DET_MOUNTAINS_OR_SENQU
    name: Applicant farms in the Mountains or Senqu River Valley
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_002
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
    ruleJson: agro_zone in ['mountains','senqu_river_valley']
    failMessage: This programme is restricted to Mountain or Senqu River Valley applicants.

  - code: DET_SMALLHOLDER
    name: Smallholder (≤ 5 ha cultivated area)
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_003
    scope: applicability
    ruleType: inclusion
    score: "100"
    allowSlowPath: "N"
