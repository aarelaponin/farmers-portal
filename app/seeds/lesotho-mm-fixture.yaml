# NOTE: md45DistribPoint was dropped from the seed in the May 2026 IM Slice 2
# cleanup. md37collectionPoint (MD.37 - Resource Center) is the canonical
# form for the same physical concept ("Resource Centre" is the MAFSN-formal
# term; "Distribution Point" was a parallel-naming mistake). 60 real Lesotho
# Resource Centres loaded into md37collectionPoint below from the canonical
# docx (_08_Implementation/LESOTHO RESOURCE CENTRES with coordinates.docx).
# md45DistribPoint form remains in the JWA but unused; future cleanup slice.

md_voucher_status:
  # Voucher lifecycle states per IM SAD §8.2 (status framework anchor).
  # sort_order drives the display order in the admin list.
  - code: issuable
    name: Issuable (entitlement created, voucher not yet issued)
    lifecycle_phase: active
    sort_order: "10"
  - code: issued
    name: Issued (voucher in farmer's hands, awaiting redemption)
    lifecycle_phase: active
    sort_order: "20"
  - code: redeemed
    name: Redeemed (farmer received the input)
    lifecycle_phase: terminal_success
    sort_order: "30"
  - code: reconciled
    name: Reconciled (voucher accounted in supplier settlement)
    lifecycle_phase: terminal_success
    sort_order: "40"
  - code: expired_unredeemed
    name: Expired without redemption
    lifecycle_phase: terminal_failure
    sort_order: "50"
  - code: cancelled
    name: Cancelled (operator-initiated revocation)
    lifecycle_phase: terminal_failure
    sort_order: "60"

# NOTE: im_input_catalog dropped in the cleanup pass — md27input (legacy MD.27)
# is canonical. Sample inputs migrated to md27input section above with the
# form-definition's snake_case keys (input_category, default_unit, etc.) and
# mapped to the existing md27inputCategory codes (SEEDS, FERTILIZER).

