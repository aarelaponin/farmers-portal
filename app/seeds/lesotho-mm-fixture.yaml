# =====================================================================
#  L3-1 — Budget & Commitment Engine: envelopes, source contributions,
#  initial ALLOCATION events.
#
#  Implements the methodology in
#  `_design/architecture/components/budget-accounting-methodology.md` §2-§3:
#    - One envelope per (programme × fiscal year), four programmes.
#    - Source contributions per envelope (single-source for PRG_001/003,
#      multi-source 60/40 for PRG_002, mixed for PRG_004).
#    - Initial ALLOCATION journal entries posting Allocated + Available
#      to envelope and (prorated) source contribution accounts.
#
#  Indicative amounts based on 2024-25 cycle scale + descriptions from
#  mm_registration.attributesJson; analyst can adjust before deploy.
#
#  Account-path convention used by the materialised view in
#  _seeds/migrations/001_budget_projection_view.sql:
#    ENV_<envelope_code>.<subaccount>     for envelope-level entries
#    SRC_<source_short>_<envelope_short>.<subaccount>  for source-level entries
#  where subaccount ∈ {ALLOCATED, AVAILABLE, RESERVED, PRE_COMMITTED,
#                      COMMITTED, EXPENSED}.
# =====================================================================

# =====================================================================
#  GROUP D — Capability registry (RegBB §3.2 / ADR-020 follow-up)
#
#  The three capability adapters that used to be hard-coded Java classes
#  (FarmerByNidAdapter / ParcelsSummaryAdapter / SubsidyApplicationCountAdapter)
#  are now driven by metadata. SqlPathEvaluator reads mm_capability rows
#  at construction time, registers one MetaCapabilityAdapter per code.
#  Each MetaCapabilityAdapter reads its mm_capability_field rows to find
#  the SQL definition for any field referenced as $registry.<code>.<field>
#  in a Determinant rule.
#
#  Adding a new capability (e.g. livestock.summary, vendor.history,
#  entitlement.balance for the IM module): add an mm_capability row + N
#  mm_capability_field rows here, run the seed. No Java rebuild.
#
#  Named placeholders supported in where_clause:
#    :nid           — the applicant's national_id (always provided)
#    :applicationId — current application's UUID (empty in fresh add-mode)
#    :<any-key>     — value from EvalContext.data.<key> (e.g. :applied_programme)
#
#  Security: source_table / expression / where_clause are spliced verbatim
#  into the SQL string and are therefore TRUSTED INPUTS — only an admin
#  with App Composer access can author/edit these rows. Bound parameters
#  (the :placeholder substitution) are still safe via PreparedStatement.
# =====================================================================

mm_capability:
  - code: farmer
    name: Farmer registry
    description: |
      Single-row lookup against app_fd_farmerbasicinfo keyed by national_id.
      Exposes the farmer's identity fields to eligibility rules and to
      L2-3 bot_pull NID auto-fill. Replaces the legacy FarmerByNidAdapter
      Java class.
  - code: parcels_summary
    name: Parcels summary
    description: |
      Aggregates a farmer's parcels. Used by every parcel-aware programme
      rule (DET_SMALLHOLDER's "≤ 5 ha cultivated", DET_AREA_NONZERO's "> 0
      ha"). Replaces ParcelsSummaryAdapter. Joins
      app_fd_farmerbasicinfo → app_fd_parcelregistration via parent_id.
  - code: subsidy
    name: Subsidy applications
    description: |
      Counts an applicant's existing subsidy applications, scoped by the
      programme they're currently applying for. Used by
      DET_NO_DUPLICATE_<programme> rules to prevent double-submission
      (L4-1 D-003 fix). Replaces SubsidyApplicationCountAdapter.

mm_capability_field:
  # ---- farmer.* ---------------------------------------------------------
  - capability_code: farmer
    code: national_id
    name: National ID
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_national_id
    where_clause: c_national_id = :nid
    default_when_no_anchor: ""
    default_when_no_row: ""
  - capability_code: farmer
    code: first_name
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_first_name
    where_clause: c_national_id = :nid
  - capability_code: farmer
    code: last_name
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_last_name
    where_clause: c_national_id = :nid
  - capability_code: farmer
    code: full_name
    name: Full name (computed)
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: TRIM(COALESCE(c_first_name,'') || ' ' || COALESCE(c_last_name,''))
    where_clause: c_national_id = :nid
  - capability_code: farmer
    code: date_of_birth
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_date_of_birth
    where_clause: c_national_id = :nid
  - capability_code: farmer
    code: gender
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_gender
    where_clause: c_national_id = :nid
  - capability_code: farmer
    code: contact_phone
    name: Mobile (alias)
    description: Aliased — schema column is c_mobile_number.
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_mobile_number
    where_clause: c_national_id = :nid
  - capability_code: farmer
    code: email
    result_type: scalar
    source_table: app_fd_farmerbasicinfo
    expression: c_email_address
    where_clause: c_national_id = :nid

  # ---- parcels_summary.* -----------------------------------------------
  - capability_code: parcels_summary
    code: parcel_count
    name: Number of parcels
    result_type: scalar
    source_table: app_fd_parcelregistration p JOIN app_fd_farmerbasicinfo f ON f.id = p.c_parent_id
    expression: count(*)
    where_clause: f.c_national_id = :nid
    default_when_no_anchor: "0"
    default_when_no_row: "0"
  - capability_code: parcels_summary
    code: cultivated_total
    name: Sum of c_area_hectares
    result_type: scalar
    source_table: app_fd_parcelregistration p JOIN app_fd_farmerbasicinfo f ON f.id = p.c_parent_id JOIN app_fd_parcelgeometry g ON g.c_parent_id = p.id
    expression: COALESCE(sum(CAST(NULLIF(g.c_area_hectares,'') AS NUMERIC(12,4))), 0)
    where_clause: f.c_national_id = :nid
    default_when_no_anchor: "0"
    default_when_no_row: "0"
  - capability_code: parcels_summary
    code: largest_parcel
    name: Max parcel size (Ha)
    result_type: scalar
    source_table: app_fd_parcelregistration p JOIN app_fd_farmerbasicinfo f ON f.id = p.c_parent_id JOIN app_fd_parcelgeometry g ON g.c_parent_id = p.id
    expression: max(CAST(NULLIF(g.c_area_hectares,'') AS NUMERIC(12,4)))
    where_clause: f.c_national_id = :nid

  # ---- subsidy.* -------------------------------------------------------
  - capability_code: subsidy
    code: prior_applications_this_programme
    name: Prior applications by this NID for the same programme
    description: |
      Used by DET_NO_DUPLICATE_<programme> rules. Excludes the current
      application's own row (id <> :applicationId) so a re-evaluation of
      the applicant's own draft doesn't trigger a false duplicate signal.
    result_type: scalar
    source_table: app_fd_subsidy_app_2025
    expression: count(*)
    where_clause: c_national_id = :nid AND c_applied_programme = :applied_programme AND id <> :applicationId
    default_when_no_anchor: "0"
    default_when_no_row: "0"

