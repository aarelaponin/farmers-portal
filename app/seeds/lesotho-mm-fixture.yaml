    failMessage: You have already submitted an application for this programme. Each applicant may apply once per cycle.

  # ------------------------------------------------------------------
  # L3-1 — Budget amount-formula determinants. Per the budget-accounting
  # methodology §3, every budget transaction needs a per-applicant amount.
  # 1B-i ships flat amounts via targetValue (closed-twenty grammar is
  # boolean-only; expression evaluation is 1C). Per-programme amounts
  # roughly proportional to envelope size and 2024-25 cycle scale.
  # ruleJson is left empty — the BudgetEngine reads targetValue directly.
  # ------------------------------------------------------------------
  - code: BENEFIT_AMOUNT_PRG_2025_001
    name: Block Farming — flat M2,000 per applicant
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_001
    scope: budget_amount
    ruleType: assignment
    score: "0"
    allowSlowPath: "N"
    ruleJson: ""
    targetValue: "2000.00"
    failMessage: ""

  - code: BENEFIT_AMOUNT_PRG_2025_002
    name: Mountain Pulses — flat M2,000 per applicant
    serviceId: SUBSIDY_2025
    registrationId: PRG_2025_002
    scope: budget_amount
    ruleType: assignment
    score: "0"
