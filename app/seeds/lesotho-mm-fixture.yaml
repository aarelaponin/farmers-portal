# at envelope level + balanced postings at each source-contribution level.
# All same transaction_id per envelope (ledger-line linkage), all share
# correlation_type=manual + source_module=manual + actor=system_seed.
#
# Per methodology §3.1:
#   - Debit ENV_X.ALLOCATED  +amount
#   - Debit ENV_X.AVAILABLE  +amount  (the new envelope is fully unencumbered)
#   - For each source contribution: same pair, prorated.
#
# (The conceptual EXTERNAL_TREASURY_AUTHORITY credit isn't materialised
# as a ledger row in this implementation — it's the external counterparty
# every ALLOCATION balances against. Implicit; documented in §3.1.)
