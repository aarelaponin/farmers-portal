  c_code: "AUTOFILL_FROM_FARMER_REGISTRY"
  c_triggerjson: |-
    {"fieldId":"national_id"}
    
  c_kind: "bot_pull"
  c_registrationid: ""
  c_name: "Auto-fill identity tab from farmer registry on NID entry"
  c_description: |-
    D11 / L2-3 — eliminate re-entry. Citizen types NID; the system
    resolves identity fields from the farmer registry. Doesn't overwrite
    values the citizen has already typed (JS guards against that). Audit
    row records the auto-fill via the underlying capability adapter call.
    
    Targets are limited to fields that (a) exist on the APP_APPLICANT
    screen AND (b) are resolvable via FarmerByNidAdapter. Notably district
    is NOT here — the registry's farmerbasicinfo table doesn't carry it,
    and farmerresidency hasn't been populated yet. When the residency
    tab gets stable columns, add a farmerResidencyByNidAdapter capability
    and extend mappings here without touching the kernel.
    
  c_serviceid: "SUBSIDY_2025"
  c_conditiondeterminantid: null

