  c_programname: "Block Farming — Maize Lowlands 2025/26"
  c_legalbasis: "Subsidy Policy 2003 §4.2.1 — Lowlands intensive crop strategy; Block Farming Programme since 2005/06"
  c_description: "Coordinated block-farming subsidy for smallholder maize producers in the four lowland districts. Inputs (improved maize seed, basal & top-dressing fertilizer) delivered to community-organised contiguous land blocks for shared mechanisation. Continuation of the established Block Farming initiative."
  c_objectives: |-
