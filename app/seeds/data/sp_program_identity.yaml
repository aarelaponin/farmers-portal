  c_programname: "Smallholder E-Voucher Pilot 2025/26"
  c_legalbasis: "Subsidy Policy 2003 §1.2.viii (investment-leaning) + §2.4 (private-sector distribution). Pilot under World Bank SADP-II."
  c_description: "E-voucher pilot covering 1,500 food-insecure smallholder households in Maseru and Mafeteng districts. SMS-delivered voucher (LSL 1,500 each) redeemable at registered agro-dealers for any combination of approved inputs."
  c_objectives: |-
    1. Test demand-driven input subsidy model vs. centrally-planned distribution.
    2. Strengthen private-sector agro-dealer network.
    3. Target food-insecure households (closes Phase 1 Gap 11).
