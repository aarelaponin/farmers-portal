  c_programname: "Mountain Pulses & Wheat — Winter 2025"
  c_legalbasis: "Subsidy Policy 2003 §4.3 — Mountains & Senqu River Valley strategy. Wheat/peas/beans favoured; maize discouraged."
  c_description: "Winter pulse and wheat input subsidy for highland farmers. Targets wheat, peas, beans — crops suited to mountain agro-ecological conditions per policy §4.3 (avoiding maize, which is not cost-effective at altitude due to frost)."
  c_objectives: |-
    1. Diversify highland cropping away from maize.
    2. Strengthen winter food production in mountain communities.
    3. Pilot conservation tillage practices.
  c_fundingsource: "Mixed: 60% Government of Lesotho, 40% FAO/IFAD"
  c_programcode: "PRG-2025-002"

