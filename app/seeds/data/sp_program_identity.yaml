  c_programname: "Drought Emergency Relief 2025"
  c_legalbasis: "Disaster Management Authority Declaration 2025-001. Subsidy Policy §2.2.2 — emergency response to acute food insecurity."
  c_description: "Cross-district emergency relief responding to El Niño drought. Cash transfers (LSL 4,000 per household, 3 monthly tranches) plus livestock fodder for cattle-owning households. Targets all districts; auto-enrolment for households flagged severely food-insecure."
  c_objectives: |-
    1. Immediate food access for 3,000 severely-affected households.
    2. Livestock survival (10,000 head fodder support).
    3. Bridge until next harvest.
