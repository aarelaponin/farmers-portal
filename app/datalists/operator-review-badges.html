
<style>
/*
 * RegBB operator-review badge styling.
 * Applies to the "Eligibility" column of list_subsidyApplicationOperator2025.
 * The TD carries cssClass="regbb-disposition-cell" (set in the datalist JSON);
 * the JS below transforms its text content into a colour-coded pill.
 */
.regbb-disposition-cell {
  white-space: nowrap;
  text-align: center;
}
.regbb-disposition-cell .regbb-pill {
  display: inline-block;
  padding: 0.18em 0.7em;
  border-radius: 999px;
  font-size: 0.85em;
  font-weight: 600;
  line-height: 1.4;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.regbb-disposition-cell .regbb-pill-passed         { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.regbb-disposition-cell .regbb-pill-pending_review { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
.regbb-disposition-cell .regbb-pill-failed         { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.regbb-disposition-cell .regbb-pill-indeterminate  { background: #e0e7ff; color: #3730a3; border: 1px solid #a5b4fc; }
.regbb-disposition-cell .regbb-pill-na             { background: #f3f4f6; color: #6b7280; border: 1px dashed #d1d5db; font-style: italic; }
</style>

<script>
/*
 * Decorate eligibility-disposition cells with pill markup once the datalist
 * has rendered. Joget renders datalists as standard <table> with class
 * 'datalist'; we hook into the page's ready event and decorate at that point,
 * then re-decorate after any Ajax refresh of the table body.
 */
(function () {
  function tagFor(text) {
    var t = (text || '').trim().toLowerCase();
    if (t === 'eligibility_passed')           return ['Passed',         'regbb-pill-passed'];
    if (t === 'eligibility_failed_mandatory') return ['Failed',         'regbb-pill-failed'];
    if (t === 'eligibility_pending_review')   return ['Pending review', 'regbb-pill-pending_review'];
    if (t === 'indeterminate')                return ['Indeterminate',  'regbb-pill-indeterminate'];
    if (t === '' || t === '-' || t === 'null') return ['—',             'regbb-pill-na'];
    return [text, 'regbb-pill-na']; // unknown — fall back to neutral
  }

  function decorate(root) {
    var $ = window.jQuery || window.$;
    if (!$) return;
    $(root).find('td.regbb-disposition-cell').each(function () {
      var $td = $(this);
      // Idempotent — skip cells already decorated.
      if ($td.find('.regbb-pill').length > 0) return;
      var raw = $td.text();
      var info = tagFor(raw);
      $td.empty().append(
        $('<span/>').addClass('regbb-pill').addClass(info[1]).text(info[0])
      );
    });
  }

  function bootstrap() {
    decorate(document);
    // Re-decorate on Ajax navigation (datalist pagination, sort, filter).
    var $ = window.jQuery || window.$;
    if ($ && $.fn && $.fn.on) {
      $(document).ajaxComplete(function () {
        // Defer so Joget's table-replacement DOM mutation has settled.
        setTimeout(function () { decorate(document); }, 30);
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrap);
  } else {
    bootstrap();
  }
})();
</script>
