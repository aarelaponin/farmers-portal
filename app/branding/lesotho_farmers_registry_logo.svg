<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Gradient for the background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
    <!-- Golden wheat gradient -->
    <linearGradient id="wheatGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
    <!-- Blue accent for Lesotho flag reference -->
    <linearGradient id="hatGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#bgGradient)"/>
  
  <!-- Decorative circle pattern -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="60" cy="60" r="40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>
  
  <!-- Mokorotlo (Basotho Hat) - simplified iconic shape -->
  <path d="M60 22 L85 55 L35 55 Z" fill="url(#hatGradient)" stroke="#ffffff" stroke-width="2"/>
  <!-- Hat brim -->
  <ellipse cx="60" cy="55" rx="28" ry="8" fill="url(#hatGradient)" stroke="#ffffff" stroke-width="2"/>
  <!-- Hat decoration line -->
  <line x1="48" y1="42" x2="72" y2="42" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Wheat stalks - left -->
  <g fill="url(#wheatGradient)">
    <!-- Left wheat -->
    <ellipse cx="32" cy="70" rx="4" ry="7" transform="rotate(-15 32 70)"/>
    <ellipse cx="30" cy="78" rx="4" ry="7" transform="rotate(-20 30 78)"/>
    <ellipse cx="29" cy="86" rx="4" ry="7" transform="rotate(-25 29 86)"/>
    <path d="M34 68 Q36 85 38 100" stroke="#FFA000" stroke-width="2" fill="none"/>
    
    <!-- Right wheat -->
    <ellipse cx="88" cy="70" rx="4" ry="7" transform="rotate(15 88 70)"/>
    <ellipse cx="90" cy="78" rx="4" ry="7" transform="rotate(20 90 78)"/>
    <ellipse cx="91" cy="86" rx="4" ry="7" transform="rotate(25 91 86)"/>
    <path d="M86 68 Q84 85 82 100" stroke="#FFA000" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Person/farmer silhouette in center -->
  <g fill="#ffffff">
    <!-- Head -->
    <circle cx="60" cy="72" r="8"/>
    <!-- Body -->
    <path d="M48 82 Q60 78 72 82 L70 100 L50 100 Z"/>
  </g>
  
  <!-- Small registration/ID card icon -->
  <g transform="translate(68, 88)">
    <rect x="0" y="0" width="16" height="12" rx="2" fill="#ffffff"/>
    <rect x="2" y="2" width="5" height="5" rx="1" fill="#2E7D32"/>
    <line x1="9" y1="3" x2="13" y2="3" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="6" x2="12" y2="6" stroke="#2E7D32" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="9" x2="13" y2="9" stroke="#2E7D32" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
