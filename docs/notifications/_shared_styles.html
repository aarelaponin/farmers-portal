<!--
Shared CSS block for every Farmers Portal email template. Inlined into each
template's HTML body (we don't link external stylesheets — many email
clients strip <link> tags).

Colour palette matches the docx briefing: navy header (#1e6091),
soft-grey content background (#f8f9fa), warm accents for state colours.
-->
<style>
  body { font-family: Arial, Helvetica, sans-serif; color: #2c3e50; max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { color: white; padding: 16px; border-radius: 4px 4px 0 0; }
  .header.info     { background: #1e6091; }  /* default — informational */
  .header.success  { background: #2e7d32; }  /* approved / redeemed */
  .header.warning  { background: #ef6c00; }  /* expiring / threshold */
  .header.danger   { background: #c62828; }  /* rejected / expired / frozen */
  .content { background: #f8f9fa; padding: 20px; border: 1px solid #dee2e6; }
  .ref-box { background: white; border-left: 4px solid #1e6091; padding: 12px 16px; margin: 16px 0; }
  .ref-box dt { font-weight: bold; color: #6c757d; font-size: 0.85em; }
  .ref-box dd { margin: 0 0 8px 0; }
  .footer { font-size: 0.85em; color: #6c757d; margin-top: 16px; padding-top: 16px; border-top: 1px solid #dee2e6; }
  ol, ul { padding-left: 24px; }
  ol li, ul li { margin-bottom: 8px; }
  .alert { background: #fff3e0; border: 1px solid #ef6c00; padding: 12px 16px; margin: 16px 0; border-radius: 4px; }
  .alert.danger { background: #ffebee; border-color: #c62828; }
  .alert.success { background: #e8f5e9; border-color: #2e7d32; }
</style>
