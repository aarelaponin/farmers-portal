# AppDefinitionProvider Plugin i18n Messages

# Plugin metadata
appDefProvider.name=App Definition Provider
appDefProvider.description=GovStack-compliant API for exporting Joget application definitions. Provides REST endpoints to export forms, processes, datalists, userviews, and complete service packages.
appDefProvider.version=8.1-SNAPSHOT
appDefProvider.tag=govstack/export
appDefProvider.label=App Definition Provider

# API Operation descriptions
appDefProvider.catalog.summary=List Available Applications
appDefProvider.catalog.description=Returns a catalog of all available applications that can be exported.

appDefProvider.exportForm.summary=Export Form Definition
appDefProvider.exportForm.description=Exports a single form definition by form ID. Metadata forms (MD. prefix) are excluded.

appDefProvider.exportApp.summary=Export Application Forms
appDefProvider.exportApp.description=Exports all non-metadata forms from an application.

