# EligibilityRuntime — i18n messages
plugin.eligibilityRuntime.config.title=Application Context
plugin.eligibilityRuntime.jre.title=JRE Connection

property.applicationId.label=Application ID
property.applicationId.description=spApplication.id of the application being evaluated. Default: #variable.applicationId#

property.applicantFarmerCode.label=Applicant Farmer Code
property.applicantFarmerCode.description=Farmer code; used to filter the JRE SQL to one applicant. Default: #variable.farmerCode#

property.programCode.label=Program Code
property.programCode.description=spProgram.code of the target programme. Default: #variable.programCode#

property.rulesetCode.label=Ruleset Code (override)
property.rulesetCode.description=Optional. If blank, the runtime loads the ruleset bound to the programme via contextType=PROGRAM, contextCode=programCode.

property.jreBaseUrl.label=JRE Base URL
property.jreBaseUrl.description=Joget URL where the joget-rules-api plugin is reachable. Default: http://localhost:8080/jw

property.jreApiKey.label=JRE API Key
property.jreApiKey.description=API key configured on the 'jre' API Builder app. Required for /jre/loadRuleset and /jre/compile.

property.writeAuditTrail.label=Write Audit Trail
property.writeAuditTrail.description=Append an entry to audit_log per evaluation.
property.writeAuditTrail.option=Yes, write audit trail
