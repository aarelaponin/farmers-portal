# FarmerDerivedRefresh — i18n messages
plugin.farmerDerivedRefresh.config.title=Refresh Configuration

property.scope.label=Scope
property.scope.description=Single = refresh one farmer (use farmerCode); All = refresh every farmer.
property.scope.single=Single farmer
property.scope.all=All farmers

property.farmerCode.label=Farmer Code
property.farmerCode.description=When scope = Single, the farmer to refresh. Supports hash variables like #variable.farmerCode#.

property.staleThresholdDays.label=Stale Threshold (days)
property.staleThresholdDays.description=When scope = All, skip farmers whose spFarmerDerived was refreshed within N days. Set to 0 to force refresh of every farmer.

property.dryRun.label=Dry Run
property.dryRun.description=If checked, log intended writes without persisting.
property.dryRun.option=Yes, dry run only
